<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 16px;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
        }
        h1 {
            font-size: 16px;
            margin: 0 0 12px 0;
            color: #333;
        }
        .status {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .status.idle {
            background: #f0f0f0;
            color: #666;
        }
        .status.recording {
            background: #ffebee;
            color: #c62828;
            font-weight: 500;
        }
        .controls {
            display: flex;
            gap: 8px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-start {
            background: #4caf50;
            color: white;
        }
        .btn-start:hover:not(:disabled) {
            background: #45a049;
        }
        .btn-stop {
            background: #f44336;
            color: white;
        }
        .btn-stop:hover:not(:disabled) {
            background: #da190b;
        }
        .info {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .dot.connected {
            background: #4caf50;
        }
        .dot.disconnected {
            background: #f44336;
        }
    </style>
</head>
<body>
    <h1>Sasiki Recorder</h1>

    <div class="connection-status">
        <span class="dot" id="connection-dot"></span>
        <span id="connection-text">Connecting...</span>
    </div>

    <div class="status idle" id="status">
        Ready to record
    </div>

    <div class="controls">
        <button class="btn-start" id="btn-start">Start Recording</button>
        <button class="btn-stop" id="btn-stop" disabled>Stop</button>
    </div>

    <div class="info">
        <strong>Instructions:</strong>
        <ol>
            <li>Make sure the Python server is running</li>
            <li>Click "Start Recording" to begin</li>
            <li>Perform actions in the browser</li>
            <li>Click "Stop" when done</li>
        </ol>
    </div>

    <script src="popup.js"></script>
</body>
</html>
